name: Build

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      manual_tag:
        description: 'Tag name (e.g., v0.2.2)'
        required: true
        default: 'manual-build'
      draft:
        description: 'Draft release'
        type: boolean
        default: false

jobs:
  config:
    runs-on: ubuntu-latest
    outputs:
      name: ${{ steps.set_name.outputs.name }}
      tag: ${{ steps.set_tag.outputs.tag }}
      draft: ${{ steps.set_draft.outputs.draft }}
    steps:
      - id: set_name
        run: echo "name=${NAME:-job-worker}" >> $GITHUB_OUTPUT
      - id: set_tag
        env:
          INPUT_TAG: ${{ github.event.inputs.manual_tag }}
          REF_NAME: ${{ github.ref_name }}
        run: echo "tag=${INPUT_TAG:-$REF_NAME}" >> $GITHUB_OUTPUT
      - id: set_draft
        env:
          INPUT_DRAFT: ${{ github.event.inputs.draft }}
        run: echo "draft=${INPUT_DRAFT:-false}" >> $GITHUB_OUTPUT
  build:
    needs: config
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: x64
            suffix: linux-x64
          - os: ubuntu-24.04-arm
            arch: arm64
            suffix: linux-arm64
          - os: windows-latest
            arch: x64
            suffix: windows-x64.exe
          - os: macos-latest
            arch: arm64
            suffix: macos-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Write version
        run: echo "VERSION = '${{ needs.config.outputs.tag }}'" > version.py

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: ${{ matrix.arch }}

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build
        env:
          APP_NAME: ${{ needs.config.outputs.name }}_${{ matrix.suffix }}
        run: pyinstaller build.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.config.outputs.name }}_${{ matrix.suffix }}
          path: dist/${{ needs.config.outputs.name }}_${{ matrix.suffix }}

  release:
    needs: [build, config]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install google-genai
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Generate release notes
        id: notes
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_MODEL: ${{ vars.GEMINI_RELEASE_NOTES_MODEL }}
          GEMINI_MESSAGE: ${{ vars.GEMINI_RELEASE_NOTES_MESSAGE }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python scripts/release_notes.py > release_notes.txt
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          cat release_notes.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.config.outputs.tag }}
          name: ${{ needs.config.outputs.tag }}${{ github.event.inputs.draft == 'true' && ' (draft)' || '' }}
          draft: ${{ github.event.inputs.draft == 'true' }}
          body: ${{ steps.notes.outputs.notes }}
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}