name: Build

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      manual_tag:
        description: 'Tag name (e.g., v0.2.2)'
        required: true
        default: 'manual-build'

jobs:
  config:
    runs-on: ubuntu-latest
    outputs:
      name: ${{ steps.set_name.outputs.name }}
    steps:
      - id: set_name
        run: echo "name=${NAME:-job-worker}" >> $GITHUB_OUTPUT
  build:
    needs: config
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: x64
            suffix: linux-x64
          - os: ubuntu-24.04-arm
            arch: arm64
            suffix: linux-arm64
          - os: windows-latest
            arch: x64
            suffix: windows-x64.exe
          - os: macos-latest
            arch: arm64
            suffix: macos-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Write version
        run: echo "VERSION = ${{ github.event.inputs.manual_tag || github.ref_name }}" > version.py

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: ${{ matrix.arch }}

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build
        env:
          APP_NAME: ${{ needs.config.outputs.name }}_${{ matrix.suffix }}
        run: pyinstaller build.spec main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.config.outputs.name }}_${{ matrix.suffix }}
          path: dist/${{ needs.config.outputs.name }}_${{ matrix.suffix }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.inputs.manual_tag || github.ref }}
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}