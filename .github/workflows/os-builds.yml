name: Build

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  config:
    runs-on: ubuntu-latest
    outputs:
      name: ${{ steps.name.outputs.name }}
    steps:
      - id: set
        run: echo "name=${NAME:-job-worker}" >> $GITHUB_OUTPUT
  build:
    needs: config
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: x64
            suffix: linux-x64
          - os: ubuntu-24.04-arm
            arch: arm64
            suffix: linux-arm64
          - os: windows-latest
            arch: x64
            suffix: windows-x64.exe
          - os: macos-latest
            arch: arm64
            suffix: macos-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: ${{ matrix.arch }}

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build
        run: pyinstaller --onefile --name ${{ needs.config.outputs.name }}-${{ matrix.suffix }} main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: dist/${{ needs.config.outputs.name }}-${{ matrix.suffix }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v3
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}